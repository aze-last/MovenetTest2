alert_cooldowns:
  cellphone: 30.0
  default: 25.0
  fight: 30.0
  knife: 60.0
camera_reconnect:
  factor: 2.0
  initial_backoff: 1.0
  max_backoff: 60.0
concealment:
  behavior:
    cooldown_frames: 60
    decay_frames: 1
    duration_frames: 27
  enabled: true
  fusion:
    association_max_hip_distance_norm: 0.15
    fusion_stale_ms: 500
    min_frontal_quality: 0.6
    min_frontal_supporting_cameras: 1
    min_fused_confidence: 0.75
    min_supporting_cameras: 2
    side_view_never_confirms: true
    single_camera_insufficient: true
    unknown_is_neutral: true
    veto_visible_threshold: 0.7
  per_camera:
    min_pose_confidence: 0.25
    wrist_missing_threshold: 0.2
    wrist_visible_threshold: 0.35
    yaw_gate_threshold: 30.0
  zones:
    default:
      cameras:
      - '0'
      - '1'
      - '2'
      - '3'
      max_occupancy_for_auto_merge: 2
config_version: 1
dataset_recorder:
  camera_scan_max: 20
  image_interval: 30
  output_dir: DatasetRecordings
debug:
  flicker_trace: false
health_monitor:
  check_interval: 10.0
incident_merging:
  merge_window: 10.0
logging:
  console: true
  file: true
  file_rotation: daily
  keep_days: 30
  level: INFO
motion_gate:
  disable_delay: 3.0
  enable_delay: 0.5
  minimum_active_duration: 1.0
  motion_gate_movenet_enabled: true
  motion_gate_yolo_enabled: false
movenet:
  bbox_kp_conf: 0.1
  coast_dedup_iou: 0.6
  detection_hysteresis_frames: 30
  ghost_kp_conf: 0.25
  ghost_min_keypoints: 5
  ghost_min_torso_keypoints: 2
  skeleton_max_age_frames: 3
performance:
  inference_queue_maxsize: 16
  parallel_inference: true
  skip_redundant_motion: true
  submit_timeout_s: 3.0
yolo:
  hysteresis_dedup_iou: 0.5
  inference_imgsz: 960
  model_path: best.engine
  model_path_fallback: best.pt
  tracker:
    fuse_score: true
    match_thresh: 0.5
    new_track_thresh: 0.25
    track_buffer: 60
    track_high_thresh: 0.2
    track_low_thresh: 0.05
  tracker_isolation: per_camera
  untracked_grid_px: 96

tracking:
  human_tracking:
    match_thresh: 0.5
    track_buffer: 60
    track_thresh: 0.25
  object_tracking:
    enabled: true
    exclude_classes:
    - person
    include_classes:
    - cellphone
    - knife
    match_thresh: 0.5
    track_buffer: 45
    track_thresh: 0.20

